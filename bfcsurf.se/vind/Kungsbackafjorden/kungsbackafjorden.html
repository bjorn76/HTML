<!-- 
 kungsbackafjorden.html

 Displays two holfuy meters and the ViVa meter on Nidingen


 -->

<style>
    /* Isolerad container för dina vind-widgets */
    .wind-widget-container {
        width: 100%;
        max-width: 1200px;
        /* margin: 0 auto;*/
        /*padding: clamp(1rem, 3vw, 2.5rem);*/
        box-sizing: border-box;
    }

    /* Styling för knapparna */
    .wind-widget-container button {
        padding: 6px 12px;
        margin-right: 5px;
        cursor: pointer;
        background-color: #f1f1f1;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-family: inherit;
        font-size: larger;
        font-weight: bold;
    }
    
    .wind-widget-container button:hover {
        background-color: #e0e0e0;
    }

    /* Responsiv Holfuy iframe-klass */
    .Holfuy {
        display: block;
        width: 100%;
        max-width: 860px; /* Maxbredd på desktop */
        height: 180px; 
        border: 2px solid #869ce4;
        margin-top: 10px;   
        /*margin-bottom: 10px;*/
        box-sizing: border-box;
        padding-top: 5px;
    }
</style>




<div class="wind-widget-container">

    <p>
        <button onclick="changeHolfuyTime(24)">6h</button> 
        <button onclick="changeHolfuyTime(48)">12h</button> 
        <button onclick="changeHolfuyTime(96)">24h</button>
    </p>
    

    <details>
        <summary class="hf-title">📍 TT, Kungsbackafjorden 💨</summary>
        <div class="hf-card" id="Torkelstorp" > </div>
    </details>

    <details>
        <summary class="hf-title">📍 Åsen, Kungsbackafjorden 💨</summary>
        <div  class="hf-card" id="Asen" > </div>
    </details>




    <iframe class="Holfuy" id="frameHolfuy1" src="https://widget.holfuy.com/?station=1555&amp;su=m/s&amp;t=C&amp;lang=en&amp;mode=average&amp;avgrows=24"></iframe>

    <iframe class="Holfuy" id="frameHolfuy2" src="https://widget.holfuy.com/?station=1798&amp;su=m/s&amp;t=C&amp;lang=en&amp;mode=average&amp;avgrows=24"></iframe>

</div>

<script type="text/javascript">
function changeHolfuyTime(rows) {
    // Uppdaterar station 1555
    document.getElementById("frameHolfuy1").src = "https://widget.holfuy.com/?station=1555&su=m/s&t=C&lang=en&mode=average&avgrows=" + rows;
    
    // Uppdaterar station 1798
    document.getElementById("frameHolfuy2").src = "https://widget.holfuy.com/?station=1798&su=m/s&t=C&lang=en&mode=average&avgrows=" + rows;
}
</script>
