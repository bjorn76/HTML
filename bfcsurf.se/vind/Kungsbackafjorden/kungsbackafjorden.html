    <style>
        /* ==========================================================================
           1. Core Reset & Global Variables
           ========================================================================== */
        :root {
            /* Responsive typography scales using CSS clamp() */
            --wp-text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
            --wp-heading-lg: clamp(1.75rem, 1.5rem + 1.25vw, 2.5rem);
            
            /* Responsive spacing utility */
            --wp-spacing-container: clamp(1rem, 3vw, 2.5rem);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            background-color: #ffffff;
            color: #111111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            font-size: var(--wp-text-base);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        *, *:before, *:after {
            box-sizing: inherit;
        }

        /* ==========================================================================
           2. Layout Container (Blank Content Area)
           ========================================================================== */
        .site-main {
            width: 100%;
            max-width: 1200px; /* Standard desktop max-width */
            margin-left: auto;
            margin-right: auto;
            padding: var(--wp-spacing-container);
        }

        /* Fluid elements inside the blank page */
        img, video, iframe {
            max-width: 100%;
            height: auto;
        }

        /* ==========================================================================
           3. WordPress Admin Bar Push (Critical for Mobile)
           ========================================================================== */
        /* Desktop Admin Bar height */
        body.admin-bar {
            margin-top: 32px;
        }

        /* Mobile Responsive Breakpoints for WordPress Admin Bar */
        @media screen and (max-width: 782px) {
            body.admin-bar {
                margin-top: 46px; /* Admin bar expands vertically on small mobile screens */
            }
        }

        @media screen and (max-width: 600px) {
            body.admin-bar {
                /* On absolute tiny screens/older environments, the admin bar becomes absolute */
                margin-top: 0; 
                padding-top: 46px;
            }
        }
