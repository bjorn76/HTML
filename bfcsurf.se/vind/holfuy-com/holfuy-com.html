    <script>

        function createHolfuyMini(station) {
            const containerMini = document.createElement('div');

            containerMini.style.display = 'flex';
            containerMini.style.alignItems = 'flex-start';
            containerMini.style.gap = '50px';
            //container.style.border = '2px';

            // Wind widget
            const mini = document.createElement('iframe');
            mini.setAttribute('frameborder', '0');
            mini.setAttribute('marginheight', '1');
            mini.setAttribute('marginwidth', '1');
            mini.setAttribute('scrolling', 'no');
            mini.src = `https://widget.holfuy.com/?station=${station}&su=m/s&t=C&lang=en&mode=mini`;
            mini.className = 'hf-wind';
            mini.style.transform = 'scale(1.28)';
            mini.style.transformOrigin = 'top left';

            mini.loading = 'lazy';
          
            containerMini.appendChild(mini);

            return containerMini;
        }

        document.getElementById('TorkelstorpMini').appendChild(createHolfuyMini(1555));
        document.getElementById('AsenMini').appendChild(createHolfuyMini(1798));
        
        




      
        function createHolfuyWidgets(station) {
            const container = document.createElement('div');

            container.style.display = 'flex';
            container.style.alignItems = 'flex-start';
            container.style.gap = '50px';
            //container.style.border = '2px';

            // Wind widget
            const wind = document.createElement('iframe');
            wind.setAttribute('frameborder', '0');
            wind.setAttribute('marginheight', '1');
            wind.setAttribute('marginwidth', '1');
            wind.setAttribute('scrolling', 'no');
            wind.src = `https://widget.holfuy.com/?station=${station}&su=m/s&t=C&lang=en&mode=mini`;
            wind.className = 'hf-wind';
            wind.style.transform = 'scale(1.28)';
            wind.style.transformOrigin = 'top left';

            


            // Average widget
            const average = document.createElement('iframe');
            average.setAttribute('frameborder', '0');
            average.setAttribute('marginheight', '1');
            average.setAttribute('marginwidth', '1');
            average.setAttribute('scrolling', 'Yes');
            average.src = `https://widget.holfuy.com/?station=${station}&su=m/s&t=C&lang=en&mode=average&avgrows=24`;
            average.className = 'hf-avg';
            //average.id = '${station}_avg'
            //average.style.width = '100%';
            //average.style.maxWidth = '720px';
            //average.style.maxHeight = '180px';
            //average.style.height = '180px';
            
            wind.loading = 'lazy';
            average.loading = 'lazy';

            
            if (window.innerWidth > 900) {
                container.appendChild(wind);
            }
            

            container.appendChild(average);

            return container;
        }

        document.getElementById('b2b2').appendChild(createHolfuyWidgets(1798));
