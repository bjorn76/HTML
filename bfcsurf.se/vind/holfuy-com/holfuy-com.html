<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holfuy Widgets</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        #container01 {
            border:2px solid dodgerblue;
        }

        #container02 {
            border:2px solid Red;
            
        }

        .hf-title { 
        /* background:#d6d3d371; */
        /* border:2px solid Red; */
        }
        

        .hf-card { 
        /* background:lightcoral; */
        background:#d6d3d371;
        padding-top: 5px;
        padding-bottom: 5px;
        /* border:2px solid DodgerBlue; */
        }
        
        
    


    </style>
</head>
<body>

    

    <details>
        <summary class="hf-title">📍 Tjörn 💨</summary>
        <div class="hf-card" id="Tjorn" > </div>
    </details>
    
    <details>
        <summary class="hf-title">📍 TT, Kungsbackafjorden 💨</summary>
        <div class="hf-card" id="Torkelstorp" > </div>
    </details>

    <details>
        <summary class="hf-title">📍 Åsen, Kungsbackafjorden 💨</summary>
        <div  class="hf-card" id="Asen" > </div>
    </details>
    
    <details>
        <summary class="hf-title">📍 Varberg 💨</summary>
        <div class="hf-card"  id="Varberg" > </div>
    </details>

    <details>
        <summary class="hf-title">📍 Båstad 💨</summary>
        <div class="hf-card"  id="Bastad" > </div>
    </details>

    <details>
        <summary class="hf-title">📍 Klagshamn 💨</summary>
        <div class="hf-card"  id="Klagshamn" > </div>
    </details>

    <details class="hf-card" >
        <summary class="hf-title">📍 Landskrona 💨</summary>
        <div class="hf-card" id="Landskrona" > </div>
    </details>




    <script>
      
        function createHolfuyWidgets(station) {
            const container = document.createElement('div');

            container.style.display = 'flex';
            container.style.alignItems = 'flex-start';
            container.style.gap = '50px';
            //container.style.border = '2px';

            // Wind widget
            const wind = document.createElement('iframe');
            wind.setAttribute('frameborder', '0');
            wind.setAttribute('marginheight', '1');
            wind.setAttribute('marginwidth', '1');
            wind.setAttribute('scrolling', 'no');
            wind.src = `https://widget.holfuy.com/?station=${station}&su=m/s&t=C&lang=en&mode=mini`;
            wind.style.width = '180px';
            //wind.style.maxHeight = '200px';
            wind.style.height = '120px';
            wind.style.padding = '2px 0px 0px 5px';
            wind.style.transform = 'scale(1.28)';
            wind.style.transformOrigin = 'top left';

            // Average widget
            const average = document.createElement('iframe');
            average.setAttribute('frameborder', '0');
            average.setAttribute('marginheight', '1');
            average.setAttribute('marginwidth', '1');
            average.setAttribute('scrolling', 'Yes');
            average.src = `https://widget.holfuy.com/?station=${station}&su=m/s&t=C&lang=en&mode=average&avgrows=48`;
            average.style.width = '100%';
            //average.style.maxWidth = '720px';
            //average.style.maxHeight = '180px';
            //average.style.height = '180px';

            container.appendChild(wind);
            container.appendChild(average);

            return container;
        }

        document.getElementById('Asen').appendChild(createHolfuyWidgets(1798));
        document.getElementById('Torkelstorp').appendChild(createHolfuyWidgets(1555));
        document.getElementById('Varberg').appendChild(createHolfuyWidgets(926));
        document.getElementById('Klagshamn').appendChild(createHolfuyWidgets(589));
        document.getElementById('Landskrona').appendChild(createHolfuyWidgets(216));
        document.getElementById('Tjorn').appendChild(createHolfuyWidgets(1944));
        document.getElementById('Bastad').appendChild(createHolfuyWidgets(127));
        

        //document.getElementById('xxxx').appendChild(createHolfuyWidgets(####));


    </script>

</body>
</html>
