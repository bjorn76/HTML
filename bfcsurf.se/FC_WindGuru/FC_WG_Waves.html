<script>
(function() {
    // 1. MASTER PARAMETERS: Change these once to update ALL widgets globally!
// 1. MASTER PARAMETERS: Change these once to update ALL widgets globally!
    const globalParams = {
        "m": "100",
        "mw": "85",            // Model filter crucial for wave display compatibility
        "wj": "ms",            // Wind speed unit (m/s)
        "tj": "c",             // Temp unit (Celsius)
        "waj": "m",            // Wave unit (meters)
        "tij": "cm",           // Tide unit (cm)
        "odh": "5",            // Start hour (5 AM)
        "doh": "23",           // End hour (11 PM)
        "fhours": "240",       // Forecast range (240 hours)
        "hrsm": "2",           // Set to 2 to properly align wave data blocks
        "vt": "forecasts",
        "lng": "en",
        "idbs": "1",
        "p": "WINDSPD,GUST,SMER,HTSGW,PERPW,DIRPW,TMP" // Includes Wave Height, Period, and Direction
    };

    // 2. WIDGET GENERATION LOGIC
    function loadWindguruWidget(element) {
        if (element.getAttribute('data-loaded')) return; // Don't reload if already built
        
        const spotId = element.getAttribute('data-spot');
        const uniqueId = "wg_template_" + spotId + "_" + Math.floor(Math.random() * 100000);
        
        // Build individual element wrapper required by Windguru script
        element.id = uniqueId;
        
        // Merge the unique spot ID & UI wrapper into the main parameters template
        let arg = [`s=${spotId}`, `uid=${uniqueId}`];
        for (let key in globalParams) {
            arg.push(`${key}=${globalParams[key]}`);
        }
        
        // Dynamically build and append the script to prevent conflicts
        const script = document.createElement("script");
        script.src = "https://www.windguru.cz/js/widget.php?" + arg.join("&");
        element.appendChild(script);
        
        element.setAttribute('data-loaded', 'true');
    }

    // 3. EXECUTION LOGIC
    function init() {
        // Immediately load the first widget (Main Spot)
        const mainSpot = document.querySelector('.windguru-widget-container .wg-target');
        if (mainSpot) loadWindguruWidget(mainSpot);

        // Lazy load the collapsed widgets ONLY when a user clicks expand
        document.querySelectorAll('details.wg-card').forEach(detailsEl => {
            detailsEl.addEventListener('toggle', function() {
                if (detailsEl.open) {
                    const target = detailsEl.querySelector('.wg-target');
                    if (target) loadWindguruWidget(target);
                }
            });
        });
    }

    // Run script cleanly safely within WordPress environment
    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
    } else {
        init();
    }
})();
</script>
