<script>
(function() {
    // ==========================================================
    //  1. DEFAULT SETTINGS 
    //  Change these variables to set the default page load state!
    // ==========================================================
    
    // Set default model (e.g., "100", "103", or "109")
    const DEFAULT_MODEL = "100"; 
    
    // Set default wave visibility (true = ON, false = OFF)
    let wavesEnabled = false;     

    // ==========================================================

    // Parameter breakdown for toggling
    const PARAM_VARS_WIND = "WINDSPD,GUST,SMER,TMP";
    const PARAM_VARS_WAVES = ",HTSGW,PERPW,DIRPW"; // Kept comma at the front to merge easily

    const globalParams = {
        "m": DEFAULT_MODEL, 
        "mw": "85",            
        "wj": "ms",            
        "tj": "c",             
        "waj": "m",            
        "tij": "cm",           
        "odh": "5",            
        "doh": "23",           
        "fhours": "240",       
        "hrsm": "2",           
        "vt": "forecasts",
        "lng": "en",
        "idbs": "1",
        "p": wavesEnabled ? (PARAM_VARS_WIND + PARAM_VARS_WAVES) : PARAM_VARS_WIND 
    };

    // 2. WIDGET GENERATION LOGIC
    function loadWindguruWidget(wrapper) {
        if (wrapper.getAttribute('data-loaded') === 'true') return; 
        
        const spotId = wrapper.getAttribute('data-spot');
        const uniqueId = "wg_template_" + spotId + "_" + Math.floor(Math.random() * 100000);
        
        // FIX: Hard-wipe the wrapper. This destroys any old scripts AND old iframes 
        // Windguru may have previously injected here.
        wrapper.innerHTML = '';
        
        // Create a fresh inner target element for Windguru to attach to
        const innerTarget = document.createElement('div');
        innerTarget.id = uniqueId;
        wrapper.appendChild(innerTarget);
        
        let arg = [`s=${spotId}`, `uid=${uniqueId}`];
        for (let key in globalParams) {
            arg.push(`${key}=${globalParams[key]}`);
        }
        
        const script = document.createElement("script");
        script.src = "https://www.windguru.cz/js/widget.php?" + arg.join("&");
        wrapper.appendChild(script);
        
        wrapper.setAttribute('data-loaded', 'true');
    }

    // 3. WIDGET RELOAD HELPER
    function reloadAllVisibleWidgets() {
        const mainSpot = document.querySelector('.windguru-widget-container .wg-target');
        if (mainSpot) {
            mainSpot.setAttribute('data-loaded', 'false');
            loadWindguruWidget(mainSpot); // The innerHTML wipe happens safely inside here
        }

        document.querySelectorAll('details.wg-card').forEach(detailsEl => {
            const wrapper = detailsEl.querySelector('.wg-target');
            if (wrapper) {
                wrapper.setAttribute('data-loaded', 'false');
                
                if (detailsEl.open) {
                    loadWindguruWidget(wrapper);
                } else {
                    wrapper.innerHTML = ''; // Keep hidden ones clean until opened
                }
            }
        });
    }

    // 4. CONTROL FUNCTIONS
    function switchModel(newModel) {
        globalParams.m = newModel;

        // Update active button styling
        document.querySelectorAll('.wg-model-btn').forEach(btn => {
            if (btn.getAttribute('data-model') === newModel) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });

        reloadAllVisibleWidgets();
    }

    function toggleWaves() {
        wavesEnabled = !wavesEnabled; 
        
        globalParams.p = wavesEnabled ? (PARAM_VARS_WIND + PARAM_VARS_WAVES) : PARAM_VARS_WIND;
        
        const waveBtn = document.getElementById('wg-wave-toggle-btn');
        if (waveBtn) {
            waveBtn.innerText = wavesEnabled ? "ON" : "OFF";
            waveBtn.style.backgroundColor = wavesEnabled ? "#91e7ac" : "#f8d7da"; 
        }

        reloadAllVisibleWidgets();
    }

    // 5. EXECUTION LOGIC
    function init() {
// Init Model buttons and set default active state
        document.querySelectorAll('.wg-model-btn').forEach(btn => {
            if (btn.getAttribute('data-model') === DEFAULT_MODEL) {
                btn.classList.add('active'); // Set initial active button
            }
            btn.addEventListener('click', function() {
                switchModel(this.getAttribute('data-model'));
            });
        });

        // Init Wave Toggle button with standardized color
        const waveBtn = document.getElementById('wg-wave-toggle-btn');
        if (waveBtn) {
            waveBtn.innerText = wavesEnabled ? "ON" : "OFF";
            waveBtn.style.backgroundColor = wavesEnabled ? "#91e7ac" : "#f8d7da";
            waveBtn.addEventListener('click', toggleWaves);
        }

        // Load the main widget
        const mainSpot = document.querySelector('.windguru-widget-container .wg-target');
        if (mainSpot) loadWindguruWidget(mainSpot);

        // Lazy load collapsed widgets
        document.querySelectorAll('details.wg-card').forEach(detailsEl => {
            detailsEl.addEventListener('toggle', function() {
                if (detailsEl.open) {
                    const wrapper = detailsEl.querySelector('.wg-target');
                    if (wrapper) loadWindguruWidget(wrapper);
                }
            });
        });
    }

    // Run script cleanly
    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
    } else {
        init();
    }
})();
</script>
